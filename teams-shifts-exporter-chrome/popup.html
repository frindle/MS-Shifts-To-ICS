<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams Shifts to ICS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 280px;
      background: #012a4a;
      color: #e8edf2;
    }

    .header {
      background: #01579B;
      padding: 14px 16px;
      border-bottom: 2px solid #F48120;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #FBCE20;
    }
    .header p {
      font-size: 11px;
      color: #b8d4ea;
      margin-top: 3px;
    }

    .body {
      padding: 14px 16px;
    }

    .status-box {
      background: #01466e;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 14px;
      border: 1px solid #0277a8;
    }
    .status-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7bacc8;
      margin-bottom: 4px;
    }
    .status-value {
      font-size: 12px;
      color: #FBCE20;
    }
    .status-value.none {
      color: #7bacc8;
    }

    .target-box {
      background: #012a4a;
      border: 1px solid #0277a8;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #b8d4ea;
    }
    .target-box span {
      color: #F48120;
      font-weight: 500;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #exportBtn {
      background: #F48120;
      color: #fff;
    }

    .note {
      margin-top: 12px;
      font-size: 10.5px;
      color: #5a8aab;
      line-height: 1.5;
    }
    .note a {
      color: #FBCE20;
    }

    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7bacc8;
      margin-bottom: 4px;
    }
    .field input {
      width: 100%;
      background: #01466e;
      border: 1px solid #0277a8;
      border-radius: 5px;
      padding: 7px 10px;
      font-size: 12px;
      color: #e8edf2;
      outline: none;
    }
    .field input:focus {
      border-color: #F48120;
    }
    .field-hint {
      font-size: 10px;
      color: #5a8aab;
      margin-top: 4px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #01466e;
      border: 1px solid #0277a8;
      border-radius: 6px;
      padding: 9px 12px;
      margin-bottom: 14px;
      cursor: pointer;
      font-size: 12px;
      color: #e8edf2;
    }
    .toggle-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #F48120;
      cursor: pointer;
    }

    #log {
      margin-top: 10px;
      font-size: 11px;
      min-height: 18px;
      color: #F48120;
    }
    #log.ok { color: #FBCE20; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Teams Shifts to ICS</h1>
    <p>Scrape &amp; export your shift schedule</p>
  </div>

  <div class="body">
    <div class="target-box">
      Exporting through <span id="targetDate">—</span>
    </div>

    <div class="status-box">
      <div class="status-label">Last export</div>
      <div class="status-value none" id="lastExport">Never</div>
    </div>

    <label class="toggle-row">
      <span>Also import to Outlook calendar</span>
      <input type="checkbox" id="importToOutlook" />
    </label>

    <label class="toggle-row">
      <span>Include open shifts</span>
      <input type="checkbox" id="includeOpenShifts" checked />
    </label>

    <button id="exportBtn">Sync Shifts</button>
    <button id="downloadICSBtn" style="margin-top:8px; background:#0277a8; color:#e8edf2;">Download ICS File</button>
    <button id="clearReimportBtn" style="margin-top:8px; background:#FBCE20; color:#01579B;">Clear &amp; Re-import to Outlook</button>

    <div id="log"></div>

    <p class="note">
      Syncs shifts daily in the background. Use <strong>Download ICS File</strong> to save a copy anytime.<br>
      Requires Teams Shifts to be open in a tab.
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
